name: Deploy WaterSensor on Environment

on:
  workflow_dispatch:
    inputs:
      serial_port:
        required: false
        type: string
      environment:
        required: true
        type: choice
        options:
          - Home

permissions:
  contents: read

jobs:
  deployment:
    runs-on: [self-hosted, iot]
    environment: ${{ inputs.environment }}

    steps:

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install required board core
        run: |
          & "$Env:RUNNER_TOOL_CACHE\arduino-cli\arduino-cli.exe" --config-file config.yaml core update-index
  
      - name: Set configs (Windows)
        shell: powershell
        env:
          SECRETS_SHARE_PATH: ${{ secrets.SECRETS_SHARE_PATH }}
          SECRETS_SHARE_USER: ${{ secrets.SECRETS_SHARE_USER }}
          SECRETS_SHARE_PASS: ${{ secrets.SECRETS_SHARE_PASS }}
          SECRETS_REPO_NAME:  ${{ secrets.SECRETS_REPO_NAME }}
          DEVICE_NAME:        WaterSensor
        run: |
          $ErrorActionPreference = 'Stop'
          $secretsDir = Join-Path $env:RUNNER_TEMP 'secrets'
          $mounted = $false

          try {
              # Mount SMB share with read-only credentials
              & net.exe use 'Z:' $env:SECRETS_SHARE_PATH /user:$env:SECRETS_SHARE_USER $env:SECRETS_SHARE_PASS | Out-Null
              if ($LASTEXITCODE -ne 0) { throw "Failed to mount SMB share (exit $LASTEXITCODE)" }
              $mounted = $true

              # Clone Configuration repo from the share
              if (Test-Path $secretsDir) { Remove-Item $secretsDir -Recurse -Force }
              $repoSource = if ($env:SECRETS_REPO_NAME) { "Z:\$env:SECRETS_REPO_NAME" } else { 'Z:\' }
              git clone --depth=1 $repoSource $secretsDir
              if ($LASTEXITCODE -ne 0) { throw "git clone failed (exit $LASTEXITCODE)" }

              # Run per-device deploy script
              $deployScript = Join-Path $secretsDir "$env:DEVICE_NAME\deploy.ps1"
              if (-not (Test-Path $deployScript)) { throw "deploy.ps1 not found at $deployScript" }

              & $deployScript -OutputDir $env:GITHUB_WORKSPACE/src/WaterSensor
              if ($LASTEXITCODE -ne 0) { throw "deploy.ps1 failed (exit $LASTEXITCODE)" }
          }
          finally {
              # Always clean up - whether the try block succeeded, threw, or was interrupted
              if (Test-Path $secretsDir) {
                  Remove-Item $secretsDir -Recurse -Force -ErrorAction SilentlyContinue
              }
              if ($mounted) {
                  & net.exe use 'Z:' /delete /yes | Out-Null
              }
              # cleanup is best-effort; do not fail the step on a stale exit code
              $global:LASTEXITCODE = 0
          }

      - name: Compile Arduino project
        run: |
          & "$Env:RUNNER_TOOL_CACHE\arduino-cli\arduino-cli.exe" --config-file config.yaml compile ./src/WaterSensor --output-dir build --build-property "compiler.cpp.extra_flags=-DFW_VERSION=${{ github.run_number }}"

      - name: Upload firmware to Arduino
        if: ${{ github.event.inputs.serial_port != '' }}
        run: |
          $port = "${{ github.event.inputs.serial_port }}"
          & "$Env:RUNNER_TOOL_CACHE\arduino-cli\arduino-cli.exe" --config-file config.yaml upload ./src/WaterSensor --port $port --input-dir build

      - name: Uložení firmware
        if: ${{ github.event.inputs.serial_port == '' }}
        shell: powershell
        env:
          FIRMWARE_TARGET_PATH: ${{ vars.FIRMWARE_TARGET_PATH }}
          FW_VERSION:  ${{ github.run_number }}
          GIT_SHA:     ${{ github.sha }}
        run: |
          $ErrorActionPreference = 'Stop'
          if (-not $env:FIRMWARE_TARGET_PATH) { throw "FIRMWARE_TARGET_PATH variable is not set" }

          $buildDir = Join-Path $env:GITHUB_WORKSPACE 'build'
          $version  = $env:FW_VERSION

          # Aplikační image pro OTA (ESP32 nahrává *.ino.bin, ne bootloader/partitions)
          $appBin = Get-ChildItem -Path $buildDir -Filter '*.ino.bin' -File | Select-Object -First 1
          if (-not $appBin) { throw "Application firmware (*.ino.bin) not found in $buildDir" }

          # 1) Historie: celý build do podadresáře pojmenovaného verzí
          $versionDir = Join-Path $env:FIRMWARE_TARGET_PATH $version
          New-Item -ItemType Directory -Path $versionDir -Force | Out-Null
          Copy-Item -Path "$buildDir\*" -Destination $versionDir -Recurse -Force

          # 2) OTA: pevná cesta na poslední firmware + manifest
          if (-not (Test-Path $env:FIRMWARE_TARGET_PATH)) {
            New-Item -ItemType Directory -Path $env:FIRMWARE_TARGET_PATH -Force | Out-Null
          }
          $latestBin = Join-Path $env:FIRMWARE_TARGET_PATH 'firmware.bin'
          Copy-Item -Path $appBin.FullName -Destination $latestBin -Force

          $hash = (Get-FileHash -Path $latestBin -Algorithm SHA256).Hash.ToLower()
          $size = (Get-Item $latestBin).Length

          # Jednoduchý key=value manifest – ESP32 ho rozparsuje bez JSON knihovny
          $manifest = @(
            "version=$version"
            "file=firmware.bin"
            "size=$size"
            "sha256=$hash"
            "commit=$($env:GIT_SHA)"
          )
          $manifestPath = Join-Path $env:FIRMWARE_TARGET_PATH 'manifest.txt'
          # LF konce řádků a bez BOM – snazší parsování na zařízení
          [System.IO.File]::WriteAllText($manifestPath, ($manifest -join "`n") + "`n")

          Write-Host "Firmware verze $version uložen do $versionDir; OTA: $latestBin (manifest $manifestPath)"

